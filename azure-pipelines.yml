- stage: Test
  jobs:
  - job: TestProject
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'

    - script: npm install
      displayName: Install Dependencies

    - script: npm test
      displayName: Run Unit Tests

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: junit.xml
        failTaskOnFailedTests: true
